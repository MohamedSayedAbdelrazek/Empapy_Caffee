server {
    listen 80;
    server_name empapy.com www.empapy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name empapy.com www.empapy.com;

    ssl_certificate /etc/letsencrypt/live/empapy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empapy.com/privkey.pem;

    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================================
    # 🚀 Gzip Compression (PageSpeed Optimization)
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ========================================
    # 📦 Browser Caching for Static Assets (1 Year)
    # ========================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|eot|mp3|wav|ogg)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # منع الوصول للملفات الحساسة
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
