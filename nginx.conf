server {
    listen 80;
    server_name empapy.com www.empapy.com;
    server_tokens off;

    # تحويل أي حد يدخل HTTP يروح أوتوماتيك لـ HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name empapy.com www.empapy.com;
    server_tokens off;

    # 🔒 مسارات شهادة الحماية الجديدة
    ssl_certificate /etc/letsencrypt/live/empapy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empapy.com/privkey.pem;

    # مسار المشروع جوه الكونتينر
    root /var/www/html/public;
    index index.php index.html;

    # Security headers (حماية إضافية)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS - إجبار المتصفح على استخدام HTTPS دائماً لمدة سنة
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy (baseline) - يسمح فقط بالـ CDNs التي يستخدمها الموقع فعلاً.
    # ملاحظة: 'unsafe-inline'/'unsafe-eval' لازمة لأن القوالب تستخدم سكربتات ومعالجات inline؛
    # يُفضّل تضييقها لاحقاً بعد نقل الـ inline scripts إلى ملفات. راجِعها على staging قبل الإنتاج.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://unpkg.com https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.bunny.net https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.bunny.net https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.google-analytics.com https://www.google-analytics.com; frame-src https://www.google.com; media-src 'self' https://assets.mixkit.co; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # ========================================
    # 🚀 Gzip Compression (PageSpeed Optimization)
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ========================================
    # 📦 Browser Caching for Static Assets (1 Year)
    # ========================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|eot|mp3|wav|ogg)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # إعدادات PHP للدوكر
    location ~ \.php$ {
        fastcgi_pass app:9000; # اسم الكونتينر app
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # منع الوصول للملفات الحساسة
    location ~ /\.(?!well-known).* {
        deny all;
    }
}