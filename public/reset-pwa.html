<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة ضبط التطبيق</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #2C1810 0%, #1a0f0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #2C1810; margin-bottom: 15px; font-size: 1.5rem; }
        p { color: #666; margin-bottom: 25px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #C9A227, #d4a84b);
            color: #2C1810;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-outline {
            background: transparent;
            border: 2px solid #C9A227;
            color: #C9A227;
        }
        .success { color: #22C55E; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="beforeReset">
            <div class="icon">🔄</div>
            <h1>إعادة ضبط حالة التطبيق</h1>
            <p>هذا سيمسح بيانات التثبيت المحفوظة وسيظهر زر التثبيت مرة أخرى</p>
            <button class="btn" onclick="resetPWA()">إعادة الضبط الآن</button>
        </div>
        
        <div id="afterReset" class="hidden">
            <div class="icon success">✅</div>
            <h1 class="success">تم بنجاح!</h1>
            <p>تم مسح بيانات التثبيت. الآن يمكنك:</p>
            <a href="/" class="btn">الذهاب للصفحة الرئيسية</a>
            <br>
            <button class="btn btn-outline" onclick="location.reload()">إعادة الضبط مرة أخرى</button>
        </div>
    </div>

    <script>
        function resetPWA() {
            // Clear all PWA related localStorage
            localStorage.removeItem('pwa-installed');
            localStorage.removeItem('pwa-user-installed');
            localStorage.removeItem('pwa-install-dismissed');
            
            // Show success message
            document.getElementById('beforeReset').classList.add('hidden');
            document.getElementById('afterReset').classList.remove('hidden');
            
            console.log('[Reset] All PWA data cleared!');
        }
    </script>
</body>
</html>
