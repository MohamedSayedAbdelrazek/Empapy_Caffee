server {
    listen 80;
    listen [::]:80;
    server_name empapycoffee.app www.empapycoffee.app;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name empapycoffee.app www.empapycoffee.app;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/empapycoffee.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empapycoffee.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Document root - Laravel's public folder
    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression (Optimized for PageSpeed)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Max upload size
    client_max_body_size 64M;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Fix storage path resolution using direct Alias
    location ^~ /storage/ {
        # Direct mapping to the mounted volume path inside the container
        alias /var/www/html/storage/app/public/;
        try_files $uri $uri/ =404;

        # Maintain caching for performance
        access_log off;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Deny access to hidden files (except .well-known)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static assets caching (1 Year for better PageSpeed)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm|mp3|wav|ogg)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Deny access to sensitive files
    location ~* (\.env|composer\.(json|lock)|package\.(json|lock)|artisan|webpack\.mix\.js|vite\.config\.js)$ {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
