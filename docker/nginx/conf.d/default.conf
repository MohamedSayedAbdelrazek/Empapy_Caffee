server {
    listen 80;
    server_name empapy.com www.empapy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name empapy.com www.empapy.com;

    # 🔒 مسارات شهادة الحماية
    ssl_certificate /etc/letsencrypt/live/empapy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empapy.com/privkey.pem;

    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 👇👇👇 هنا "التعويذة" رجعناها تاني! (الحل السحري للصور)
    # العلامة ^~ بتقول لـ Nginx: "لو اللينك فيه storage، متطبقش عليه أي قواعد تانية واديه أولوية قصوى"
    location ^~ /storage/ {
        alias /var/www/html/public/storage/;
        try_files $uri $uri/ =404;
    }

    # التعامل مع باقي الروابط
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # التعامل مع ملفات PHP
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # قواعد الكاش (عشان الموقع يبقى سريع)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}